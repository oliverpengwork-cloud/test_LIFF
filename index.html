<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>揪團配對中...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 85%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .status-tag { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
        .content-text { line-height: 1.8; color: #333; white-space: pre-wrap; font-size: 15px; text-align: left; }
        .highlight { color: #d32f2f; font-weight: bold; }
        .loading-bar { height: 6px; background: #eee; border-radius: 3px; margin: 20px 0; overflow: hidden; }
        .progress { height: 100%; background: #00b900; width: 0%; transition: width 1s ease; }
        .btn { background: #00b900; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; }
        .user-list { background: #f9f9f9; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 14px; text-align: left; }
        .test-reset-btn { background: none; border: 1px dashed #ccc; color: #999; width: 100%; padding: 10px; border-radius: 10px; font-size: 12px; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div id="statusTag" class="status-tag">系統啟動中</div>
    <div class="loading-bar"><div id="progressBar" class="progress"></div></div>
    
    <div id="titleArea" class="content-text" style="text-align:center; font-weight:bold; margin-bottom:10px;"></div>
    
    <button id="actionBtn" class="btn" onclick="completeProcess()">確認並領取折扣碼</button>
    
    <div id="displayArea" class="content-text">正在初始化配對環境...</div>
    
    <button class="test-reset-btn" onclick="resetTest()">🛠️ 測試專用：清除紀錄並重跑動畫</button>
</div>

<script>
    const LIFF_ID = '2009338553-kxBbv5XD'; 
    const locations = ["新北市", "台中市", "台北市", "高雄市", "桃園市", "台南市", "彰化縣", "屏東縣", "雲林縣", "新竹縣", "苗栗縣", "嘉義縣", "南投縣", "宜蘭縣", "新竹市", "基隆市", "花蓮縣", "台東縣", "嘉義市"];
    const names = ["陳", "林", "李", "張", "王", "吳", "劉", "蔡", "楊", "許", "鄭", "謝", "洪", "郭", "邱", "曾", "廖", "賴", "徐", "周", "葉", "蘇", "莊", "呂", "江", "何", "蕭", "羅", "高", "潘", "詹", "馮", "游", "盧", "朱", "程", "趙", "彭", "顏", "余", "柯", "翁", "魏", "孫", "戴", "范", "方", "宋"];
    
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const randPick = (arr) => arr[Math.floor(Math.random() * arr.length)];

    function resetTest() {
        localStorage.removeItem('liff_match_record');
        location.reload();
    }

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            const savedData = localStorage.getItem('liff_match_record');
            if (savedData) {
                renderFinalStage(JSON.parse(savedData));
            } else {
                startFlow();
            }
        } catch (e) { document.getElementById('displayArea').innerText = "啟動失敗，請重新開啟"; }
    }

    async function startFlow() {
        const area = document.getElementById('displayArea');
        const progress = document.getElementById('progressBar');
        const tag = document.getElementById('statusTag');

        const matchData = {
            waitingUsers: randInt(100, 200),
            waitingMins: randInt(1, 2),
            finalPrice: randInt(950, 999),
            mate1_Loc: randPick(locations),
            mate1_Name: randPick(names),
            mate2_Loc: randPick(locations),
            mate2_Name: randPick(names),
            discountCode: "MATCH" + randInt(1000, 9999)
        };

        tag.innerText = "搜尋在線用戶";
        progress.style.width = "15%";
        area.innerHTML = `🚀 揪團配對系統已啟動\n正在為您搜尋全台同步在線的女神...\n目前在線等待人數：<span class="highlight">${matchData.waitingUsers}</span> 人\n⏳ 系統配對中，請稍候 <span class="highlight">${matchData.waitingMins}</span> 分鐘。`;

        setTimeout(() => {
            tag.innerText = "媒合中 66%";
            progress.style.width = "66%";
            area.innerHTML = `🔍 系統搜尋進度：66%\n👤 已成功媒合一位隊友：<span class="highlight">${matchData.mate1_Loc}</span>・<span class="highlight">${matchData.mate1_Name}小姐</span> (已就位)\n\n💰 即將為您省下 $533 元！\n一旦配對成功，原價 $1,500 的通行證，您只需支付 <span class="highlight">$${matchData.finalPrice}</span>。\n\n預計剩餘等待時間：2 分鐘，請勿關閉對話視窗。`;
        }, 7000); 

        setTimeout(() => {
            localStorage.setItem('liff_match_record', JSON.stringify(matchData));
            renderFinalStage(matchData);
        }, 20000);
    }

    function renderFinalStage(data) {
        const titleArea = document.getElementById('titleArea');
        const area = document.getElementById('displayArea');
        const progress = document.getElementById('progressBar');
        const tag = document.getElementById('statusTag');

        tag.innerText = "配對完成";
        tag.style.background = "#ffebee";
        tag.style.color = "#c62828";
        progress.style.width = "100%";

        // 1. 設定標題內容
        titleArea.innerHTML = `✨ 配對成功！三人團已達成 ✨`;

        // 2. 顯示按鈕 (此時它會位於 titleArea 下方，displayArea 上方)
        document.getElementById('actionBtn').style.display = "block";

        // 3. 設定名單與說明文字
        area.innerHTML = `<div class="user-list">1️⃣ 您 (等待中)\n2️⃣ ${data.mate1_Loc}・${data.mate1_Name}小姐 (已就位)\n3️⃣ ${data.mate2_Loc}・${data.mate2_Name}小姐 (已就位)</div>💰 您的專屬湊團價：<span class="highlight">$${data.finalPrice}</span>\n\n⚠️ 最後步驟：\n為了保障另外兩位隊友的權益，請於 <span class="highlight">1 小時內</span> 完成結帳。若您逾時未付，系統將自動剔除您的名額，並開放給下一位候補隊友。`;
    }

    async function completeProcess() {
        const savedData = localStorage.getItem('liff_match_record');
        let codeToSend = savedData ? JSON.parse(savedData).discountCode : "MATCH888";

        try {
            await liff.sendMessages([{
                type: 'text',
                text: `【系統通知】配對成功！\n\n為了保障另外兩位隊友的權益，請於 1 小時內 完成結帳。若您逾時未付，系統將自動剔除您的名額，並開放給下一位候補隊友。\n\n專屬折扣碼：${codeToSend}\n結帳金額：967元\n稍後客服確認配對結果，可完成結帳。`
            }]);
            liff.closeWindow();
        } catch (e) {
            alert("請先將官方帳號加入好友");
            liff.closeWindow();
        }
    }

    init();
</script>

</body>
</html>
